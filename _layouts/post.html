---
layout: landing
---

<article class="post">
  <h1>{{ page.title | escape }}</h1>

  <p class="poem-date">{{ page.date | date: "%B %-d, %Y" }}</p>

  <div class="post-content">
    {{ content }}
  </div>

  {%- if page.tags.size > 0 -%}
  <div class="poem-tags">
    {%- for tag in page.tags -%}
      <span class="tag">#{{ tag }}</span>
    {%- endfor -%}
  </div>
  {%- endif -%}

</article>

<nav class="work-nav" id="work-nav"></nav>

<script src="{{ '/assets/js/bg-symbols.js' | relative_url }}"></script>
<script>
  const fieldsData = { {% for field in site.fields %}"{{ field.slug }}": { symbol: "{{ field.symbol }}", color: "{{ field.color }}" }{% unless forloop.last %},{% endunless %}{% endfor %} };

  (function() {
    const ctx = new URLSearchParams(window.location.search).get('context');
    if (!ctx) return;

    const map = { seas: 'var(--soft-blue)', roads: 'var(--soft-pink)' };
    document.documentElement.style.setProperty('--accent', map[ctx] || 'var(--soft-green)');

    if (ctx === 'seas') {
      applySymbolBackground('≈', '#89c5d4');
    } else {
      const field = fieldsData[ctx];
      if (field) applySymbolBackground(SYMBOL_CHARS[field.symbol], SYMBOL_COLORS[field.color]);
    }
  })();

  {% assign seas_items = site.poems | concat: site.prose | sort: 'date' %}
  const seasOrder = [{% for item in seas_items %}{"url":"{{ item.url | relative_url }}","title":{{ item.title | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}];

  const fieldsOrder = {
    {% for field in site.fields %}"{{ field.slug }}": [{% for work in field.works %}{% if work.collection == 'poems' %}{% assign item = site.poems | where: "slug", work.slug | first %}{% elsif work.collection == 'prose' %}{% assign item = site.prose | where: "slug", work.slug | first %}{% else %}{% assign item = nil %}{% endif %}{% if item %}{"url":"{{ item.url | relative_url }}","title":{{ item.title | jsonify }}}{% unless forloop.last %},{% endunless %}{% endif %}{% endfor %}]{% unless forloop.last %},{% endunless %}{% endfor %}
  };

  const currentUrl = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  const context = params.get('context');

  const list = (context && context !== 'seas' && fieldsOrder[context])
    ? fieldsOrder[context]
    : seasOrder;

  const idx = list.findIndex(item => item.url === currentUrl);

  if (idx !== -1) {
    const prev = idx > 0 ? list[idx - 1] : null;
    const next = idx < list.length - 1 ? list[idx + 1] : null;
    const suffix = context ? '?context=' + encodeURIComponent(context) : '';
    const nav = document.getElementById('work-nav');
    nav.innerHTML =
      (prev ? '<a href="' + prev.url + suffix + '" class="work-nav-link work-nav-prev">← ' + prev.title + '</a>' : '<span></span>') +
      (next ? '<a href="' + next.url + suffix + '" class="work-nav-link work-nav-next">' + next.title + ' →</a>' : '<span></span>');
  }
</script>
